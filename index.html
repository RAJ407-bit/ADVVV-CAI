<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Integral Calculator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

    <style>
        :root { --bg1:#0f172a; --bg2:#1e293b; --accent:#60a5fa; --card:rgba(255,255,255,.1); --text:#fff; }
        .light { --bg1:#dbeafe; --bg2:#f8fafc; --accent:#2563eb; --card:rgba(255,255,255,.6); --text:#111827; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; color:var(--text); background: radial-gradient(circle at 50% 50%, #1e1b4b, #0f172a); min-height:100vh; overflow-x:hidden; }
        
        /* Particle Background */
        .particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
        .particle { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); } 100% { transform: translateY(-10vh) scale(1); } }

        /* Kaya/Energy Wave Background */
        .waves { position: fixed; bottom: 0; left: 0; width: 100%; height: 30vh; z-index: -1; background: linear-gradient(0deg, rgba(96,165,250,0.15) 0%, transparent 100%); animation: waveMove 10s infinite alternate ease-in-out; }
        @keyframes waveMove { 0% { clip-path: polygon(0 80%, 30% 60%, 70% 90%, 100% 70%, 100% 100%, 0 100%); } 100% { clip-path: polygon(0 60%, 40% 80%, 60% 50%, 100% 80%, 100% 100%, 0 100%); } }

        .wrap { max-width:1100px; margin:auto; padding:20px; position:relative; }
        .card { backdrop-filter:blur(20px); background:var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius:24px; padding:24px; box-shadow:0 10px 40px rgba(0,0,0,0.4); }
        .grid { display:grid; grid-template-columns:350px 1fr; gap:20px; }
        input, button { width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); margin:8px 0; background: rgba(255,255,255,0.05); color: inherit; }
        button { cursor:pointer; background:var(--accent); color:white; font-weight:bold; transition: filter 0.2s, transform 0.1s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        canvas { background:rgba(0,0,0,0.2); border-radius:16px; width: 100% !important; height: 400px !important; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="waves"></div>
    <div class="wrap">
        <h1>∫ Premium Integral</h1>
        <div class="grid">
            <div class="card">
                <label>Function f(x)</label>
                <input id="fn" value="x^2">
                <label>Lower Limit</label>
                <input id="lower" type="number" value="0">
                <label>Upper Limit</label>
                <input id="upper" type="number" value="5">
                <button onclick="calculate()">Calculate Area</button>
                <div id="formula" style="margin-top:15px; font-size:1.2em"></div>
                <div id="result" style="font-size:2em; font-weight:bold; color:var(--accent);">--</div>
            </div>
            <div class="card">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

<script>
    for(let i=0; i<15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.width = Math.random()*100 + 'px';
        p.style.height = p.style.width;
        p.style.left = Math.random()*100 + '%';
        p.style.animationDelay = Math.random()*15 + 's';
        document.getElementById('particles').appendChild(p);
    }

    let chart;
    function calculate() {
        const f = document.getElementById('fn').value;
        const a = parseFloat(document.getElementById('lower').value);
        const b = parseFloat(document.getElementById('upper').value);
        try {
            const code = math.parse(f).compile();
            const xs = [], ys = [];
            const samples = 300; 
            for(let i=0; i<=samples; i++) {
                let x = a + (b-a) * (i/samples);
                xs.push(x.toFixed(2));
                ys.push(code.evaluate({x}));
            }
            
            let sum = 0;
            for(let i=0; i<=samples; i++) {
                let x = a + (b-a) * (i/samples);
                let w = (i==0 || i==samples) ? 1 : (i%2==1 ? 4 : 2);
                sum += w * code.evaluate({x});
            }
            document.getElementById('result').innerText = (sum * (b-a) / (3*samples)).toFixed(6);
            katex.render("f(x)="+f, document.getElementById('formula'), {throwOnError:false});
            drawChart(xs, ys);
        } catch(e) { document.getElementById('result').innerText = "Invalid"; }
    }

    function drawChart(xs, ys) {
        const ctx = document.getElementById('chart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(96, 165, 250, 0.5)');
        gradient.addColorStop(1, 'rgba(96, 165, 250, 0)');

        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: xs, datasets: [{ 
                data: ys, borderColor: '#60a5fa', backgroundColor: gradient,
                fill: true, tension: 0.4, pointRadius: 0
            }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 1500, easing: 'easeOutQuart' },
                plugins: { legend: { display: false } },
                scales: { 
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });
    }
    calculate();
</script>
</body>
</html>
